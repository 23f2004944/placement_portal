<!DOCTYPE html>
<head>
<title>Applications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="table-responsive mb-5">
    <h1>Student Applications</h1>
    <table class="table table-striped table-bordered align-middle" style="width: 50%;">
        <tr>
        <th>Student ID</th>
        <th>Status</th>
        <th>Action</th>
        </tr>
        {% for app in applications %}
        <tr>
        <td>{{ app.student_id }}</td>
        <td>{{ app.status }}</td>
        <td><a href="/company/update_application/{{ app.id }}/shortlisted"><button class="btn btn-success">Shortlist</button></a>
        <a href="/company/update_application/{{ app.id }}/rejected">
        <button class= "btn btn-danger">Reject</button>
        </a>
        </td>
        </tr>
        {% endfor %}
    </table>
    <a href="/company_dashboard" class="btn btn-primary">Back</a>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
