<!DOCTYPE html>
<html lang="en">
    <title>PLACEMENT PORTAL - Login</title>
    <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <div class = "mb-3 container mt-5 w-50 p-3 border bg-light">
        <h1 style = "text-align: center;">LOGIN TO PLACEMENT PORTAL</h1><br><br>
        <form action = "/login" method = "post">
            <label for = "username">Username</label><br>
            <input type = "text" name="username" class="form-control" placeholder="Username"><br>
            <label for = "password">Password</label><br>   
            <input type = "password" name="password" class="form-control" placeholder="Password"><br><br>
            <button type="submit" class="btn btn-primary">submit</button>
        </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    </body>
</html>
